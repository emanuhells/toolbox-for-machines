# SearXNG settings for Toolbox — JSON API only, no HTML UI needed.
# Tuned for programmatic access by AI agents.

use_default_settings: true

general:
  instance_name: "Toolbox Search"
  debug: false
  donation_url: false
  contact_url: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "change-me-generate-with-openssl-rand-hex-32"
  limiter: false
  image_proxy: false
  public_instance: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - json
  default_locale: "en"

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0

# Disable unreliable/slow engines that cause IT category timeouts
engines:
  - name: stackoverflow
    disabled: false
    timeout: 12.0
  - name: github
    disabled: false
    timeout: 12.0
  - name: gitlab
    disabled: true
  - name: codeberg
    disabled: true
  - name: searchcode code
    disabled: true
  - name: npm
    disabled: true
  - name: packagist
    disabled: true
  - name: hoogle
    disabled: true
  - name: crates.io
    disabled: true

ui:
  static_use_hash: false
  default_locale: "en"
  theme_args:
    simple_style: "dark"
