name: toolbox

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  api:
    <<: *common
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: toolbox-api
    ports:
      - "0.0.0.0:${TOOLBOX_PORT:-9600}:9600"
    environment:
      TOOLBOX_PORT: "9600"
      SEARXNG_URL: http://searxng:8080
      CAMOUFOX_URL: http://camoufox:8790
      WHISPER_URL: http://whisper:8200
      LLM_URL: ${LLM_URL:-http://host.docker.internal:8080/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # Model name sent in API requests. Must match your LLM server's loaded model.
      LLM_MODEL: ${LLM_MODEL:-qwen3-vl-8b}
      LLM_MAX_CONCURRENT: ${LLM_MAX_CONCURRENT:-1}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-512}
      FETCH_TIMEOUT_SECONDS: ${FETCH_TIMEOUT_SECONDS:-30}
      API_KEY: ${API_KEY:-}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_DB_PATH: /data/cache.db
    volumes:
      - cache-data:/data
    depends_on:
      searxng:
        condition: service_healthy
      camoufox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9600/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  searxng:
    <<: *common
    image: searxng/searxng:latest
    container_name: toolbox-searxng
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-generate-with-openssl-rand-hex-32}
    volumes:
      - ./config/searxng/settings.yml:/etc/searxng/settings.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  camoufox:
    <<: *common
    build:
      context: ./camoufox
      dockerfile: Dockerfile
    container_name: toolbox-camoufox
    mem_limit: 2048m
    memswap_limit: 2048m
    environment:
      CAMOUFOX_LOCALE: en-US
      CAMOUFOX_TZ: ${CAMOUFOX_TZ:-UTC}
      CAMOUFOX_TIMEOUT_MS: "20000"
      CAMOUFOX_MAX_REQUESTS: "200"
    volumes:
      - camoufox-cache:/root/.camoufox
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/healthz', timeout=5)\""]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 30s

  whisper:
    <<: *common
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: toolbox-whisper
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/', timeout=3)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  cache-data:
  camoufox-cache:
